<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MacBook HTML Texture Demo</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #a0a0a0;
        color: #111111;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      #scene-root {
        position: fixed;
        inset: 0;
        z-index: 1;
        background: #a0a0a0;
      }

      .macbook-scene {
        width: 100%;
        height: 100%;
        display: block;
      }

      #html-source {
        position: fixed;
        left: 0;
        top: 0;
        width: 1536px;
        height: 1024px;
        border: 0;
        pointer-events: none;
        transform: scale(0.01);
        transform-origin: top left;
        z-index: 0;
      }

      #computer-screen {
        position: absolute;
        inset: 0;
        width: 1536px;
        height: 1024px;
        overflow: hidden;
        background: #11131b url("/assets/background.png") center / cover no-repeat;
        color: white;
        isolation: isolate;
      }

      .desktop-sheen {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 22% 20%, rgba(255, 255, 255, 0.24), transparent 26%),
          linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 45%);
        pointer-events: none;
      }

      .desktop-bar {
        position: absolute;
        left: 24px;
        right: 24px;
        top: 22px;
        height: 54px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 18px;
        background: rgba(18, 22, 32, 0.46);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(18px) saturate(1.25);
        font-size: 20px;
        font-weight: 650;
      }

      .desktop-time {
        font-variant-numeric: tabular-nums;
        opacity: 0.86;
      }

      .glass-window {
        position: absolute;
        left: 92px;
        top: 150px;
        width: 610px;
        min-height: 390px;
        padding: 30px;
        border: 1px solid rgba(255, 255, 255, 0.26);
        border-radius: 28px;
        background: rgba(13, 18, 28, 0.5);
        box-shadow:
          0 30px 90px rgba(0, 0, 0, 0.38),
          inset 0 1px 0 rgba(255, 255, 255, 0.24);
        backdrop-filter: blur(28px) saturate(1.35);
      }

      .window-controls {
        display: flex;
        gap: 10px;
        margin-bottom: 34px;
      }

      .window-controls span {
        width: 17px;
        height: 17px;
        border-radius: 999px;
        background: #ff5f57;
      }

      .window-controls span:nth-child(2) {
        background: #febc2e;
      }

      .window-controls span:nth-child(3) {
        background: #28c840;
      }

      .glass-window h1 {
        margin: 0 0 18px;
        font-size: 64px;
        line-height: 0.94;
        letter-spacing: 0;
      }

      .glass-window p {
        max-width: 440px;
        margin: 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: 24px;
        line-height: 1.35;
      }

      .dock {
        position: absolute;
        left: 50%;
        bottom: 34px;
        display: flex;
        gap: 18px;
        padding: 18px 22px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 30px;
        background: rgba(20, 24, 34, 0.45);
        backdrop-filter: blur(24px) saturate(1.3);
        transform: translateX(-50%);
      }

      .dock span {
        width: 58px;
        height: 58px;
        border-radius: 16px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
      }

      .dock span:nth-child(1) {
        background: linear-gradient(135deg, #7dd3fc, #2563eb);
      }

      .dock span:nth-child(2) {
        background: linear-gradient(135deg, #f9a8d4, #7c3aed);
      }

      .dock span:nth-child(3) {
        background: linear-gradient(135deg, #86efac, #0f766e);
      }

      .dock span:nth-child(4) {
        background: linear-gradient(135deg, #fde68a, #ea580c);
      }

      .model-credit {
        position: fixed;
        right: 18px;
        bottom: 14px;
        z-index: 2;
        color: rgba(17, 17, 17, 0.62);
        font-size: 11px;
        text-decoration: none;
      }

      #scene-status {
        position: fixed;
        left: 18px;
        bottom: 14px;
        z-index: 2;
        color: rgba(17, 17, 17, 0.72);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main id="scene-root"></main>

    <canvas id="html-source" width="1536" height="1024" layoutsubtree>
      <section id="computer-screen">
        <div class="desktop-sheen"></div>
        <div class="desktop-bar">
          <span>Liquid Glass</span>
          <span class="desktop-time">Fri 2:42 PM</span>
        </div>
        <article class="glass-window">
          <div class="window-controls"><span></span><span></span><span></span></div>
          <h1>HTML on the MacBook screen.</h1>
          <p>The desktop is real DOM rendered through Three.js HTMLTexture, with the project background image underneath.</p>
        </article>
        <nav class="dock">
          <span></span><span></span><span></span><span></span>
        </nav>
      </section>
    </canvas>

    <a
      class="model-credit"
      href="https://sketchfab.com/3d-models/macbook-pro-m3-16-inch-2024-8e34fc2b303144f78490007d91ff57c4"
      target="_blank"
    >
      MacBook model by jackbaeten
    </a>
    <div id="scene-status">Loading MacBook...</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

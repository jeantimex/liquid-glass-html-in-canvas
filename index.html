<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Liquid Glass + HTML-in-Canvas</title>
    <style>
      html {
        height: 100%;
      }

      body {
        display: block;
        position: relative;
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #07070d;
        color: #f0f0f0;
        font-family: system-ui, -apple-system, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      #canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      /* Background image */
      .background {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .background img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Glass panel content styling */
      #content {
        position: absolute;
        top: 40px;
        left: 0;
        right: 0;
        width: fit-content;
        margin: 0 auto;
        padding: 1rem 2rem;
        font-size: clamp(1.25rem, 3vw, 2rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        background: linear-gradient(
          135deg,
          #6c41f0 0%,
          #d52e66 45%,
          #ff5926 70%,
          #00e5b9 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.1;
        white-space: nowrap;
        transform-origin: 0 0;
      }

      /* Liquid glass styling via CSS custom properties */
      .liquid-glass {
        --lg-blur: 0.15;
        --lg-refraction: 0.7;
        --lg-corner-radius: 32;
        --lg-z-radius: 28;
        --lg-chrom-aberration: 0.06;
        --lg-edge-highlight: 0.08;
        --lg-fresnel: 1.2;
        --lg-shadow-opacity: 0.35;
        --lg-shadow-spread: 15;
      }

      /* GitHub link styling */
      #github-link {
        position: absolute;
        left: 24px;
        bottom: 24px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 20px;
        color: #fff;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        --lg-corner-radius: 24;
        --lg-z-radius: 20;
        --lg-blur: 0.2;
      }

      #github-link svg {
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" layoutsubtree>
      <!-- Background image -->
      <div class="background" id="background">
        <img src="/assets/diagon_alley.jpg" alt="Background" />
      </div>

      <!-- Glass panel with content (top center via CSS) -->
      <div id="content" class="liquid-glass">Liquid Glass HTML in Canvas</div>

      <!-- GitHub link (bottom left) -->
      <a id="github-link" class="liquid-glass" href="https://github.com" target="_blank">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.09-.745.083-.73.083-.73 1.205.085 1.84 1.237 1.84 1.237 1.07 1.834 2.806 1.304 3.49.997.108-.775.42-1.305.763-1.605-2.665-.3-5.467-1.332-5.467-5.93 0-1.31.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.3 1.23A11.5 11.5 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.29-1.552 3.297-1.23 3.297-1.23.653 1.652.242 2.873.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.625-5.479 5.921.43.372.823 1.102.823 2.222 0 1.606-.015 2.896-.015 3.293 0 .322.216.694.825.576C20.565 21.795 24 17.298 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        <span>View on GitHub</span>
      </a>
    </canvas>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Liquid Glass + HTML-in-Canvas</title>
    <style>
      html {
        height: 100%;
      }

      body {
        display: block;
        position: relative;
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #07070d;
        color: #f0f0f0;
        font-family: system-ui, -apple-system, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      #canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      /* Background image */
      .background {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .background img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Glass panel content styling */
      #content {
        position: absolute;
        left: 0;
        top: 0;
        padding: 1.5rem 2.5rem;
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 800;
        letter-spacing: -0.025em;
        background: linear-gradient(
          135deg,
          #6c41f0 0%,
          #d52e66 45%,
          #ff5926 70%,
          #00e5b9 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.1;
        white-space: nowrap;
        transform-origin: 0 0;
      }

      /* Liquid glass styling via CSS custom properties */
      .liquid-glass {
        --lg-blur: 0.15;
        --lg-refraction: 0.7;
        --lg-corner-radius: 32;
        --lg-z-radius: 28;
        --lg-chrom-aberration: 0.06;
        --lg-edge-highlight: 0.08;
        --lg-fresnel: 1.2;
        --lg-shadow-opacity: 0.35;
        --lg-shadow-spread: 15;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" layoutsubtree>
      <!-- Background image -->
      <div class="background" id="background">
        <img src="/assets/diagon_alley.jpg" alt="Background" />
      </div>

      <!-- Glass panel with content -->
      <div id="content" class="liquid-glass">Hello, Canvas!</div>
    </canvas>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MacBook HTML Texture Demo</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #a0a0a0;
        color: #111111;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      #scene-root {
        position: fixed;
        inset: 0;
        z-index: 2;
        background: #a0a0a0;
      }

      .macbook-scene {
        width: 100%;
        height: 100%;
        display: block;
      }

      #html-source {
        position: fixed;
        left: 0;
        top: 0;
        width: 1536px;
        height: 1024px;
        border: 0;
        pointer-events: none;
        z-index: 1;
      }

      .desktop-background {
        position: absolute;
        left: 0;
        top: 0;
        width: 1536px;
        height: 1024px;
        overflow: hidden;
      }

      .desktop-background img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .desktop-sheen {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 22% 20%, rgba(255, 255, 255, 0.24), transparent 26%),
          linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 45%);
        pointer-events: none;
      }

      .desktop-bar {
        position: absolute;
        left: 24px;
        right: 24px;
        top: 22px;
        height: 54px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        border: 0;
        border-radius: 18px;
        background: rgba(18, 22, 32, 0.46);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
        font-size: 20px;
        font-weight: 650;
        color: white;

        --lg-blur: 0.18;
        --lg-refraction: 0.5;
        --lg-corner-radius: 18;
        --lg-saturation: 0.25;
      }

      .desktop-time {
        font-variant-numeric: tabular-nums;
        opacity: 0.86;
      }

      .glass-window {
        position: absolute;
        left: 92px;
        top: 150px;
        width: 610px;
        min-height: 390px;
        padding: 30px;
        color: white;

        --lg-blur: 0.28;
        --lg-refraction: 0.6;
        --lg-corner-radius: 28;
        --lg-saturation: 0.35;
        --lg-z-radius: 30;
      }

      .window-controls {
        display: flex;
        gap: 10px;
        margin-bottom: 34px;
      }

      .window-controls span {
        width: 17px;
        height: 17px;
        border-radius: 999px;
        background: #ff5f57;
      }

      .window-controls span:nth-child(2) {
        background: #febc2e;
      }

      .window-controls span:nth-child(3) {
        background: #28c840;
      }

      .glass-window h1 {
        margin: 0 0 18px;
        font-size: 64px;
        line-height: 0.94;
        letter-spacing: 0;
      }

      .glass-window p {
        max-width: 440px;
        margin: 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: 24px;
        line-height: 1.35;
      }

      .browser-window {
        position: absolute;
        left: 730px;
        top: 130px;
        width: 720px;
        height: 560px;
        z-index: 4;
        border-radius: 26px;
        overflow: hidden;
        background: rgba(244, 247, 252, 0.92);
        box-shadow: 0 26px 80px rgba(0, 0, 0, 0.34);
      }

      .browser-toolbar {
        height: 72px;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 0 18px;
        background: rgba(231, 236, 245, 0.94);
      }

      .browser-controls {
        display: flex;
        gap: 8px;
        flex: 0 0 auto;
      }

      .browser-controls span {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: #ff5f57;
      }

      .browser-controls span:nth-child(2) {
        background: #febc2e;
      }

      .browser-controls span:nth-child(3) {
        background: #28c840;
      }

      .browser-address {
        height: 38px;
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        padding: 0 16px;
        border-radius: 999px;
        background: white;
        color: #172033;
        font-size: 15px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.08);
      }

      .browser-address.is-active {
        box-shadow:
          inset 0 0 0 2px rgba(59, 130, 246, 0.8),
          0 0 0 4px rgba(59, 130, 246, 0.18);
      }

      .browser-address.is-empty {
        color: #7c8798;
      }

      .browser-frame {
        width: 100%;
        height: calc(100% - 72px);
        overflow: hidden;
        background: white;
      }

      .dock {
        position: absolute;
        left: calc(50% - 165px);
        bottom: 34px;
        width: 330px;
        display: flex;
        gap: 18px;
        padding: 18px 22px;
        border: 0;
        border-radius: 30px;
        background: rgba(20, 24, 34, 0.45);

        --lg-blur: 0.2;
        --lg-refraction: 0.4;
        --lg-corner-radius: 30;
      }

      .dock span {
        width: 58px;
        height: 58px;
        border-radius: 16px;
        display: grid;
        place-items: center;
        overflow: hidden;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
      }

      .dock img {
        width: 58px;
        height: 58px;
        display: block;
        object-fit: contain;
      }

      .demo-credit {
        position: fixed;
        left: 18px;
        bottom: 14px;
        z-index: 2;
        color: rgba(17, 17, 17, 0.62);
        font-size: 11px;
        text-decoration: none;
      }

      .model-credit {
        position: fixed;
        right: 18px;
        bottom: 14px;
        z-index: 2;
        color: rgba(17, 17, 17, 0.62);
        font-size: 11px;
        text-decoration: none;
      }

      #scene-status {
        position: fixed;
        left: 18px;
        bottom: 14px;
        z-index: 2;
        color: rgba(17, 17, 17, 0.72);
        font-size: 12px;
      }

      .lil-gui.root {
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <main id="scene-root"></main>

    <canvas id="html-source" width="1536" height="1024" layoutsubtree>
      <div class="desktop-background">
        <img src="/assets/background.png" alt="" />
        <div class="desktop-sheen"></div>
      </div>
      <div class="desktop-bar liquid-glass">
        <span class="desktop-time">Fri 2:42 PM</span>
      </div>
      <article class="glass-window liquid-glass">
        <div class="window-controls"><span></span><span></span><span></span></div>
        <h1>HTML on the MacBook screen.</h1>
        <p>The desktop is real DOM rendered through Three.js HTMLTexture, with the project background image underneath.</p>
      </article>
      <nav class="dock liquid-glass">
        <span aria-label="Finder">
          <img src="/assets/finder.png" alt="" />
        </span>
        <span aria-label="Chrome">
          <img src="/assets/chrome.png" alt="" />
        </span>
        <span aria-label="Mail">
          <img src="/assets/mail.png" alt="" />
        </span>
        <span aria-label="Three.js">
          <img src="/assets/threejs.png" alt="" />
        </span>
      </nav>
      <section class="browser-window" aria-label="Chrome browser">
        <div class="browser-toolbar">
          <div class="browser-controls"><span></span><span></span><span></span></div>
          <div class="browser-address" role="textbox" aria-label="Address bar"></div>
        </div>
        <div class="browser-frame" role="document"></div>
      </section>
    </canvas>
    <a
      class="demo-credit"
      href="https://github.com/jeantimex/liquid-glass-html-in-canvas"
      target="_blank"
    >
      Demo by jeantimex
    </a>
    <a
      class="model-credit"
      href="https://sketchfab.com/3d-models/macbook-pro-m3-16-inch-2024-8e34fc2b303144f78490007d91ff57c4"
      target="_blank"
    >
      MacBook model by jackbaeten
    </a>
    <div id="scene-status">Loading MacBook...</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

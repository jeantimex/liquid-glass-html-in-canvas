<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Browser Demo</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #132033;
        background: #f8fafc;
      }

      * {
        user-select: text;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 84% 16%, rgba(59, 130, 246, 0.16), transparent 30%),
          linear-gradient(135deg, #ffffff 0%, #edf4ff 100%);
      }

      h1 {
        margin: 0 0 12px;
        max-width: 520px;
        font-size: 38px;
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        max-width: 520px;
        margin: 0 0 24px;
        color: #526178;
        font-size: 17px;
        line-height: 1.55;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        max-width: 560px;
      }

      .tile {
        min-height: 96px;
        padding: 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow:
          inset 0 0 0 1px rgba(15, 23, 42, 0.08),
          0 14px 36px rgba(15, 23, 42, 0.08);
      }

      .tile strong {
        display: block;
        margin-bottom: 8px;
        font-size: 15px;
      }

      .tile span {
        color: #64748b;
        font-size: 13px;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <main style="padding: 40px;">
      <h1>Same-origin page inside the MacBook browser.</h1>
      <p>This page is served from the app itself and painted into the desktop browser viewport.</p>
      <section class="grid" aria-label="Demo features">
        <div class="tile"><strong>HTML</strong><span>Loaded from a same-origin demo page.</span></div>
        <div class="tile"><strong>Canvas</strong><span>Captured into the screen texture.</span></div>
        <div class="tile"><strong>Three.js</strong><span>Displayed on the 3D MacBook model.</span></div>
      </section>
    </main>
  </body>
</html>
